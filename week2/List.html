<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 04 - Lists</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">
</head>
<body>
    <h2>Unorder List</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
        </ul>
    <h2>Unorder List</h2>
        <ol>
            <li>Create file</li>
            <li>Write Code</li>
            <li>Open Browser</li>
        </ol>
    <h2>Order List</h2>
    <!--dl is the parent of dt and dd like
     ul and ol if haven't ul or ol, li will a simple text -->
    <!--dt is a title of description-->
    <!-- dd is a description -->
        <dl>
            <dt>HTML</dt>
            <dd>Structure of a webpage</dd>
            <dt>CSS</dt>
            <dd>Style of a webpage</dd>
        </dl>
</body>
</html>
